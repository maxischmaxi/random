name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install NASM
        run: sudo apt-get update && sudo apt-get install -y nasm

      - name: Build
        run: make linux

      - uses: actions/upload-artifact@v5
        with:
          name: random-linux-x86_64
          path: random-linux-x86_64

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install NASM
        run: brew install nasm

      - name: Build
        run: |
          make macos-arm
          make macos-intel

      - uses: actions/upload-artifact@v5
        with:
          name: random-macos
          path: |
            random-macos-x86_64
            random-macos-arm64

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install NASM
        run: choco install nasm -y

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build
        shell: cmd
        run: |
          set PATH=C:\Program Files\NASM;%PATH%
          make windows

      - uses: actions/upload-artifact@v5
        with:
          name: random-windows-x86_64
          path: random-windows-x86_64.exe

  release:
    needs: [build-linux, build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v5
        with:
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            random-linux-x86_64
            random-macos-x86_64
            random-macos-arm64
            random-windows-x86_64.exe
